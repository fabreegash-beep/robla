<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>تحدي الحروف السحرية | النسخة الاحترافية</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #ffffff;
            text-align: center;
            padding: 20px 16px;
            min-height: 100vh;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 40%, rgba(255, 0, 150, 0.15), transparent 60%);
            pointer-events: none; z-index: 0;
        }
        .card {
            background: rgba(20, 20, 50, 0.65);
            backdrop-filter: blur(16px);
            border-radius: 40px;
            padding: 28px 24px;
            max-width: 1100px;
            margin: 20px auto;
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5);
            position: relative; z-index: 1;
        }
        h2 {
            font-size: 2rem; font-weight: 800;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            -webkit-background-clip: text; background-clip: text; color: transparent;
            margin-bottom: 12px;
        }
        .room-info {
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 20px; border-radius: 100px;
            display: inline-flex; align-items: center; gap: 15px;
            margin-bottom: 20px; border: 1px solid #ff6a88;
        }
        .score-panel {
            display: flex; justify-content: space-between; gap: 10px;
            margin-bottom: 20px;
        }
        .score-card {
            background: rgba(0, 0, 0, 0.6); padding: 10px 20px;
            border-radius: 50px; flex: 1; border: 1px solid #00d2ff;
        }
        .score-value { color: #f9f871; font-size: 1.5rem; font-weight: 800; }
        .timer {
            font-size: 2.2rem; font-weight: 800; font-family: monospace;
            color: #00d2ff; display: block; margin-bottom: 10px;
        }
        .question-box {
            background: linear-gradient(120deg, #ff4e50, #f9d423);
            padding: 20px; border-radius: 30px;
            margin: 15px 0; font-size: 1.3rem; font-weight: 700;
            color: #1a1a2e; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        /* التصميم المطلوب: الإدخال يمين والحروف يسار */
        .game-controls-wrapper {
            display: flex;
            flex-direction: row; /* لضمان الترتيب الأفقي */
            gap: 15px;
            margin-top: 20px;
            align-items: stretch;
        }
        .input-section {
            flex: 2; /* تأخذ مساحة أكبر للإدخال */
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border: 1px solid rgba(0, 210, 255, 0.3);
        }
        .letters-section {
            flex: 1; /* مساحة أقل للحروف السبعة */
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 30px;
            border: 1px solid rgba(255, 106, 136, 0.3);
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-content: center;
            gap: 8px;
        }

        .letter-item {
            background: linear-gradient(145deg, #8e2de2, #4a00e0);
            padding: 10px 15px; border-radius: 15px;
            font-weight: 800; font-size: 1.2rem; cursor: pointer;
            transition: 0.2s; border: 1px solid rgba(255,255,255,0.2);
        }
        .letter-item.selected {
            background: linear-gradient(145deg, #f9f871, #ffb347);
            color: #1a1a2e; transform: scale(1.1); box-shadow: 0 0 15px #f9f871;
        }

        input {
            width: 100%; padding: 15px; border-radius: 20px;
            border: 2px solid #ff6a88; background: #000; color: #fff;
            font-size: 1.1rem; text-align: center;
        }
        .btn-send {
            background: linear-gradient(135deg, #00b4db, #0083b0);
            color: white; border: none; padding: 12px; border-radius: 20px;
            font-weight: bold; cursor: pointer; width: 100%;
        }

        .ans-column {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px; padding: 15px; margin-top: 15px;
            min-height: 100px;
        }
        .ans-item {
            background: rgba(255,255,255,0.1); padding: 8px 15px;
            border-radius: 15px; margin-bottom: 5px; display: flex;
            justify-content: space-between; font-size: 0.9rem;
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 9999;
            display: flex; justify-content: center; align-items: center;
        }
        .hidden { display: none !important; }
        .btn { cursor: pointer; font-family: 'Cairo'; }
    </style>
</head>
<body>

<div id="lobby" class="card">
    <h2>👑 تحدي الحروف السحرية</h2>
    <p style="margin-bottom: 20px;">أدخل كود الغرفة للبدء</p>
    <input type="number" id="roomInput" placeholder="🔢 كود الغرفة" style="margin-bottom: 15px;">
    <div style="display: flex; gap: 10px; justify-content: center;">
        <button class="btn-send" style="background:#ff6a88" onclick="createRoom()">إنشاء غرفة</button>
        <button class="btn-send" onclick="setupRoom('guest')">انضمام</button>
    </div>
</div>

<div id="game-screen" class="card hidden">
    <div class="room-info">
        <span>كود الغرفة: <strong id="roomCodeText">----</strong></span>
        <button onclick="copyCode()" style="background:none; border:none; color:#00d2ff; cursor:pointer;">📋 نسخ</button>
    </div>

    <div class="score-panel">
        <div class="score-card">أنا: <span class="score-value" id="my-score">0</span></div>
        <div class="timer" id="timer-display">30</div>
        <div class="score-card">الخصم: <span class="score-value" id="opp-score">0</span></div>
    </div>

    <div id="question-area" class="question-box">بانتظار الخصم...</div>

    <div id="game-elements" class="hidden">
        <div class="game-controls-wrapper">
            <div class="input-section" id="action-area">
                <input type="text" id="ansInput" placeholder="اكتب إجابتك هنا..." maxlength="70">
                <button class="btn-send" onclick="submitAns()">إرسال الجواب ✈️</button>
            </div>
            
            <div class="letters-section">
                <div style="width: 100%; font-size: 0.8rem; margin-bottom: 5px;">حروفي:</div>
                <div id="my-letters" style="display: contents;"></div>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px;">
            <div class="ans-column">
                <small>إجاباتي</small>
                <div id="my-ans-list"></div>
            </div>
            <div class="ans-column">
                <small>تقييم الخصم / حروفه</small>
                <div id="opp-letters" style="margin-bottom: 10px;"></div>
                <div id="voting-panel"></div>
            </div>
        </div>
    </div>

    <div id="host-controls" class="hidden">
        <button class="btn-send" style="background:#f9ca24; color:#000" onclick="nextRound()">السؤال التالي ➡️</button>
    </div>
</div>

<div id="result-overlay" class="overlay hidden">
    <div class="card" style="max-width: 400px;">
        <div id="win-ui" class="hidden"><h1>🏆 فزت!</h1></div>
        <div id="lose-ui" class="hidden"><h1>😭 خسرت!</h1></div>
        <button class="btn-send" onclick="location.reload()">الرئيسية</button>
    </div>
</div>

<script>
    // --- بنك الأسئلة والتهيئة (نفس الكود الأصلي تماماً) ---
    const QUESTIONS_BANK = ["واش الحاجة لي إذا طاحت في الدار كامل يخافو منها؟ 😅","واش أول حاجة ديرها كي ينقطع الضوء؟ 💡","وش هو أغرب عذر سمعتو باش واحد ما يخدمش؟ 🤣","إذا تصبح رئيس نهار واحد، وش أول قرار غبي تديرو؟ 👑","وش الحاجة لي تقولها قدام الناس وتندم عليها بعد؟ 😬","إذا صاحبك يطلب منك 1000 دج وما يرجعهمش، وش تدير؟ 💸","وش هو أتعس فطور فالعالم؟ 🥲","إذا يدوك للعرس غصب عليك، وش تدير باش تهرب؟ 😂","وش الحاجة لي تخليك تضحك بلا سبب؟","إذا تشوف روحك في المنام، وش تقول لنفسك؟ 😵","وش أكثر كلمة يقولها الجزائري كي يتعصب؟ 😡","وش الحاجة لي دايماً تكون \"غالية بزاف\"؟ 💰","وش أكثر حاجة تتقال في الأعراس؟ 💃","وش الحاجة لي نكذبو فيها كامل؟ 🤥","وش الحاجة لي كل واحد يقول \"غدوة نبدأ فيها\" وما يبدأش؟ 😴","وش أكثر حاجة تخاف منها كي تكون صغير؟ 👻","وش الحاجة لي تشريها وما تستعملهاش؟ 🛒","وش أكثر جملة يقولها الأستاذ؟ 🧑‍🏫","وش الحاجة لي كل واحد يدير فيها روحو فاهم؟ 😏","إذا لازم تعيش مع حيوان، وش تختار؟ 🐒","إذا صاحبك تبدل وصار غني، وش أول حاجة تطلبها منو؟ 😂"];
    
    const firebaseConfig = {
        apiKey: "AIzaSyCTKYD680Jdbl0azC9RTtuKZBaLX2uU_Ck",
        authDomain: "my-online-store-34f34.firebaseapp.com",
        databaseURL: "https://my-online-store-34f34-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "my-online-store-34f34",
        storageBucket: "my-online-store-34f34.firebasestorage.app",
        messagingSenderId: "288655549705",
        appId: "1:288655549705:web:06901ce4ac1a50eebe1fd8"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let rId, myRole, oppRole, timerInterval = null;
    const alphabet = "أبتثجحخدذرزسشصضطظعغفقكلمنهوي";

    function generateLetters() {
        return alphabet.split('').sort(() => 0.5 - Math.random()).slice(0, 7);
    }

    function createRoom() {
        const code = Math.floor(1000 + Math.random() * 9000);
        document.getElementById('roomInput').value = code;
        setupRoom('host');
    }

    function setupRoom(role) {
        rId = document.getElementById('roomInput').value.trim();
        if (!rId) return alert("أدخل الكود");
        myRole = role;
        oppRole = (role === 'host') ? 'guest' : 'host';
        document.getElementById('roomCodeText').innerText = rId;

        if (role === 'host') {
            db.ref('rooms/' + rId).set({
                hostL: generateLetters(),
                guestL: generateLetters(),
                status: 'waiting',
                q: QUESTIONS_BANK[Math.floor(Math.random() * QUESTIONS_BANK.length)],
                ans: { host: [], guest: [] },
                scores: { host: 0, guest: 0 },
                timeLeft: 30
            });
        } else {
            db.ref('rooms/' + rId).update({ status: 'playing' });
        }
        document.getElementById('lobby').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        startListening();
    }

    function startListening() {
        db.ref('rooms/' + rId).on('value', (snap) => {
            const data = snap.val();
            if (!data) return;

            document.getElementById('my-score').innerText = data.scores[myRole];
            document.getElementById('opp-score').innerText = data.scores[oppRole];

            if (data.status === 'waiting') {
                document.getElementById('question-area').innerText = "⏳ بانتظار دخول الخصم...";
                document.getElementById('game-elements').classList.add('hidden');
                return;
            }

            document.getElementById('game-elements').classList.remove('hidden');
            document.getElementById('question-area').innerText = "📢 " + data.q;
            document.getElementById('timer-display').innerText = data.timeLeft;

            renderMyLetters(data[myRole + 'L'] || []);
            renderOppLetters(data[oppRole + 'L'] || []);

            if (data.scores[myRole] >= 15 || (data[myRole+'L'] && data[myRole+'L'].length === 0)) showResult(true);
            if (data.scores[oppRole] >= 15 || (data[oppRole+'L'] && data[oppRole+'L'].length === 0)) showResult(false);

            if (data.timeLeft === 0) {
                document.getElementById('action-area').classList.add('hidden');
                if (myRole === 'host') document.getElementById('host-controls').classList.remove('hidden');
                renderVotingPanel(data.ans ? data.ans[oppRole] : []);
            } else {
                document.getElementById('action-area').classList.remove('hidden');
                document.getElementById('host-controls').classList.add('hidden');
                document.getElementById('voting-panel').innerHTML = "";
                if (myRole === 'host') startTimerSync();
            }

            const myAns = data.ans ? data.ans[myRole] : [];
            document.getElementById('my-ans-list').innerHTML = (myAns || []).map(a => `
                <div class="ans-item"><span>${a.text}</span><small>${a.status}</small></div>
            `).join('');
        });
    }

    function renderMyLetters(letters) {
        document.getElementById('my-letters').innerHTML = letters.map(l => `
            <span class="letter-item" onclick="selectLetter('${l}')">${l}</span>
        `).join('');
    }

    function renderOppLetters(letters) {
        document.getElementById('opp-letters').innerHTML = "حروف الخصم: " + letters.join(' ');
    }

    function selectLetter(l) {
        const items = document.querySelectorAll('#my-letters .letter-item');
        items.forEach(i => i.classList.remove('selected'));
        event.target.classList.add('selected');
    }

    function submitAns() {
        const text = document.getElementById('ansInput').value.trim();
        if (!text) return;
        const firstLetter = text[0];

        db.ref(`rooms/${rId}/${myRole}L`).once('value', snap => {
            const letters = snap.val() || [];
            if (!letters.includes(firstLetter)) return alert("يجب أن تبدأ بحرف من حروفك!");

            db.ref(`rooms/${rId}/ans/${myRole}`).once('value', sAns => {
                let list = sAns.val() || [];
                list.push({ text: text, letter: firstLetter, status: 'pending' });
                db.ref(`rooms/${rId}/ans/${myRole}`).set(list);
                document.getElementById('ansInput').value = "";
            });
        });
    }

    function renderVotingPanel(oppAnswers) {
        const container = document.getElementById('voting-panel');
        const pending = (oppAnswers || []).filter(a => a.status === 'pending');
        if (pending.length === 0) return container.innerHTML = "<small>انتظار...</small>";
        
        container.innerHTML = "<h4>قيم الخصم:</h4>";
        pending.forEach(ans => {
            container.innerHTML += `
                <div class="ans-item">
                    <span>${ans.text}</span>
                    <button onclick="vote('${ans.text}', 'accepted')">✅</button>
                    <button onclick="vote('${ans.text}', 'rejected')">❌</button>
                </div>
            `;
        });
    }

    window.vote = function(text, status) {
        db.ref(`rooms/${rId}/ans/${oppRole}`).once('value', snap => {
            let list = snap.val();
            let idx = list.findIndex(a => a.text === text);
            if (idx > -1) {
                list[idx].status = status;
                if (status === 'accepted') {
                    db.ref(`rooms/${rId}/scores/${oppRole}`).transaction(s => (s || 0) + 1);
                    db.ref(`rooms/${rId}/${oppRole}L`).once('value', sL => {
                        let letters = sL.val();
                        let lIdx = letters.indexOf(list[idx].letter);
                        if (lIdx > -1) {
                            letters.splice(lIdx, 1);
                            db.ref(`rooms/${rId}/${oppRole}L`).set(letters);
                        }
                    });
                }
                db.ref(`rooms/${rId}/ans/${oppRole}`).set(list);
            }
        });
    }

    function startTimerSync() {
        if (timerInterval) return;
        timerInterval = setInterval(() => {
            db.ref(`rooms/${rId}/timeLeft`).transaction(t => (t > 0 ? t - 1 : 0));
        }, 1000);
    }

    function nextRound() {
        db.ref('rooms/' + rId).update({
            timeLeft: 30,
            q: QUESTIONS_BANK[Math.floor(Math.random() * QUESTIONS_BANK.length)],
            ans: { host: [], guest: [] }
        });
    }

    function showResult(win) {
        document.getElementById('result-overlay').classList.remove('hidden');
        document.getElementById('win-ui').classList.toggle('hidden', !win);
        document.getElementById('lose-ui').classList.toggle('hidden', win);
    }

    function copyCode() {
        navigator.clipboard.writeText(rId);
        alert("تم النسخ!");
    }
</script>
</body>
</html>
