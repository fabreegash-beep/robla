    const alphabet = "أبتثجحخدذرزسشصضطظعغفقكلمنهوي";

    function generateLetters() {
        return Array.from({length: 7}, () => alphabet[Math.floor(Math.random() * alphabet.length)]);
    }

    function createRoom() {
        const code = Math.floor(1000 + Math.random() * 9000);
        document.getElementById('roomInput').value = code;
        setupRoom('host');
    }

    function setupRoom(role) {
        rId = document.getElementById('roomInput').value.trim();
        if (!rId) return alert("أدخل الكود");
        myRole = role;
        oppRole = (role === 'host') ? 'guest' : 'host';
        document.getElementById('roomCodeText').innerText = rId;

        if (role === 'host') {
            db.ref('rooms/' + rId).set({
                hostL: generateLetters(),
                guestL: generateLetters(),
                status: 'waiting',
                q: QUESTIONS_BANK[Math.floor(Math.random() * QUESTIONS_BANK.length)],
                ans: { host: [], guest: [] },
                scores: { host: 0, guest: 0 },
                timeLeft: 30
            });
        } else {
            db.ref('rooms/' + rId).update({ status: 'playing' });
        }
        document.getElementById('lobby').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        startListening();
    }

    function startListening() {
        db.ref('rooms/' + rId).on('value', (snap) => {
            const data = snap.val();
            if (!data) return;

            document.getElementById('my-score').innerText = data.scores[myRole];
            document.getElementById('opp-score').innerText = data.scores[oppRole];

            if (data.status === 'waiting') {
                document.getElementById('question-area').innerText = "⏳ بانتظار دخول الخصم...";
                document.getElementById('game-elements').classList.add('hidden');
                document.getElementById('timer-display').innerText = "30";
                return;
            }

            document.getElementById('game-elements').classList.remove('hidden');
            document.getElementById('question-area').innerHTML = "📢 " + data.q;
            document.getElementById('timer-display').innerText = data.timeLeft;

            renderMyLetters(data[myRole + 'L'] || []);
            
            // الحروف الخصم مخفية كما طلبت (لا تظهر أبداً)
            // no-op
            
            if ((data[myRole+'L'] && data[myRole+'L'].length === 0) || data.scores[myRole] >= 15) {
                showResult(true);
            } else if ((data[oppRole+'L'] && data[oppRole+'L'].length === 0) || data.scores[oppRole] >= 15) {
                showResult(false);
            }

            if (data.timeLeft === 0) {
                document.getElementById('action-area').classList.add('hidden');
                if (myRole === 'host') document.getElementById('host-controls').classList.remove('hidden');
                renderVotingPanel(data.ans ? data.ans[oppRole] : []);
            } else {
                document.getElementById('action-area').classList.remove('hidden');
                document.getElementById('host-controls').classList.add('hidden');
                document.getElementById('voting-panel').innerHTML = "";
                if (myRole === 'host') startTimerSync();
            }

            const myAns = data.ans ? data.ans[myRole] : [];
            document.getElementById('my-ans-list').innerHTML = (myAns || []).map(a => `
                <div class="ans-item"><span>${escapeHtml(a.text)}</span><small>${a.status === 'pending' ? '⏳ قيد التقييم' : (a.status === 'accepted' ? '✅ مقبولة' : '❌ مرفوضة')}</small></div>
            `).join('');
        });
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    function renderMyLetters(letters) {
        const container = document.getElementById('my-letters');
        container.innerHTML = letters.map(l => `
            <span class="letter-item ${selectedLetter === l ? 'selected' : ''}" onclick="selectLetter('${l}')">${l}</span>
        `).join('');
    }

    function selectLetter(l) {
        selectedLetter = l;
        const letters = document.querySelectorAll('#my-letters .letter-item');
        letters.forEach(el => {
            if(el.innerText === l) el.classList.add('selected');
            else el.classList.remove('selected');
        });
    }

    function submitAns() {
        if (!selectedLetter) return alert("⚠️ اختر حرفاً أولاً من قائمتك!");
        const text = document.getElementById('ansInput').value.trim();
        if (!text) return alert("اكتب إجابة");
        if (!text.startsWith(selectedLetter)) return alert(`⚠️ الإجابة يجب أن تبدأ بحرف (${selectedLetter})`);

        db.ref(`rooms/${rId}/ans/${myRole}`).once('value', snap => {
            let list = snap.val() || [];
            list.push({ text: text, letter: selectedLetter, status: 'pending' });
            db.ref(`rooms/${rId}/ans/${myRole}`).set(list);
            document.getElementById('ansInput').value = "";
            selectedLetter = null;
            // reset selection UI
            document.querySelectorAll('#my-letters .letter-item').forEach(el => el.classList.remove('selected'));
        });
    }

    function renderVotingPanel(oppAnswers) {
        const container = document.getElementById('voting-panel');
        const pending = (oppAnswers || []).filter(a => a.status === 'pending');
        if (pending.length === 0) {
            container.innerHTML = "<div class='small-text'>✨ بانتظار إجابات الخصم للتقييم</div>";
            return;
        }
        
        container.innerHTML = "<div class='voting-title'>🗳️ قيِّم إجابات الخصم:</div>";
        pending.forEach(ans => {
            container.innerHTML += `
                <div class="ans-item" style="flex-wrap:wrap; gap:8px;">
                    <span style="flex:1; text-align:right;">${escapeHtml(ans.text)}</span>
                    <div>
                        <button class="btn" style="background:#55efc4; padding:4px 12px; margin-left:5px;" onclick="vote('${escapeHtml(ans.text)}', 'accepted')">✅</button>
                        <button class="btn" style="background:#ff7675; padding:4px 12px;" onclick="vote('${escapeHtml(ans.text)}', 'rejected')">❌</button>
                    </div>
                </div>
            `;
        });
    }

    window.vote = function(text, status) {
        db.ref(`rooms/${rId}/ans/${oppRole}`).once('value', snap => {
            let list = snap.val();
            if (!list) return;
            let idx = list.findIndex(a => a.text === text);
            if (idx > -1 && list[idx].status === 'pending') {
                list[idx].status = status;
                if (status === 'accepted') {
                    db.ref(`rooms/${rId}/scores/${oppRole}`).transaction(s => (s || 0) + 1);
                    db.ref(`rooms/${rId}/${oppRole}L`).once('value', sL => {
                        let letters = sL.val() || [];
                        let lIdx = letters.indexOf(list[idx].letter);
                        if (lIdx > -1) {
                            letters.splice(lIdx, 1);
                            db.ref(`rooms/${rId}/${oppRole}L`).set(letters);
                        }
                    });
                }
                db.ref(`rooms/${rId}/ans/${oppRole}`).set(list);
            }
        });
    }

    function startTimerSync() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            db.ref(`rooms/${rId}/timeLeft`).transaction(t => {
                if (t && t > 0) return t - 1;
                if (t === 0) return 0;
                return 0;
            });
        }, 1000);
    }

    function nextRound() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = null;
        db.ref('rooms/' + rId).update({
            timeLeft: 30,
            q: QUESTIONS_BANK[Math.floor(Math.random() * QUESTIONS_BANK.length)],
            ans: { host: [], guest: [] }
        });
    }

    function showResult(win) {
        if (timerInterval) clearInterval(timerInterval);
        document.getElementById('result-overlay').classList.remove('hidden');
        document.getElementById('win-ui').classList.toggle('hidden', !win);
        document.getElementById('lose-ui').classList.toggle('hidden', win);
    }

    function copyCode() {
        navigator.clipboard.writeText(rId);
        alert("تم نسخ الكود: " + rId);
    }

    window.createRoom = createRoom;
    window.setupRoom = setupRoom;
    window.submitAns = submitAns;
    window.nextRound = nextRound;
    window.copyCode = copyCode;
    window.selectLetter = selectLetter;
</script>
</body>
</html>
