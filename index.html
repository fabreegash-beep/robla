<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>تحدي الحروف | نسخة مصغرة</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: radial-gradient(circle at 10% 30%, #0b0b2b, #030318);
            color: #ffffff;
            text-align: center;
            padding: 18px 12px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 70% 20%, rgba(255, 80, 180, 0.25), transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .card {
            background: rgba(12, 12, 35, 0.7);
            backdrop-filter: blur(18px);
            border-radius: 56px;
            padding: 20px 16px;
            max-width: 680px;
            width: 100%;
            margin: 0 auto;
            border: 1px solid rgba(255, 200, 255, 0.3);
            box-shadow: 0 30px 45px rgba(0, 0, 0, 0.6), 0 0 0 2px rgba(255, 105, 200, 0.2), 0 0 30px rgba(255, 0, 150, 0.3);
            transition: all 0.2s;
            position: relative;
            z-index: 2;
        }

        h2 {
            font-size: 1.7rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFE6B0, #FF9A9E, #D4A5FF);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 18px rgba(255, 200, 100, 0.6);
            margin-bottom: 4px;
        }

        .room-info {
            background: rgba(0, 0, 0, 0.6);
            padding: 4px 14px;
            border-radius: 100px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
            border: 1px solid #ffaa66;
            box-shadow: 0 0 8px #ffaa66aa;
            font-weight: 600;
            font-size: 0.8rem;
        }

        .btn-copy {
            background: linear-gradient(135deg, #FFB347, #FF6B6B);
            border: none;
            padding: 4px 14px;
            border-radius: 50px;
            color: #111;
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: bold;
        }

        .score-panel {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 14px;
        }

        .score-card {
            background: rgba(0, 0, 0, 0.65);
            padding: 4px 10px;
            border-radius: 40px;
            flex: 1;
            display: flex;
            align-items: baseline;
            justify-content: center;
            gap: 6px;
            font-weight: bold;
            font-size: 0.8rem;
            border: 1px solid #2effc6;
            box-shadow: 0 0 8px #2effc6aa;
        }

        .score-value {
            color: #FFE484;
            font-size: 1.5rem;
            font-weight: 800;
            text-shadow: 0 0 8px #FFB347;
        }

        .question-box {
            background: linear-gradient(125deg, #FF416C, #FF4B2B);
            padding: 12px 10px;
            border-radius: 40px;
            margin: 12px 0;
            font-size: 1rem;
            font-weight: 700;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.4);
            color: #fff4e0;
            word-break: break-word;
        }

        .dual-layout {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin: 12px 0;
        }

        .opponent-section, .my-section {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 10px 10px;
            border: 1px solid #ff66c0;
            box-shadow: 0 0 10px rgba(255, 102, 192, 0.3);
        }

        .my-section {
            border-color: #3eff9e;
            box-shadow: 0 0 10px rgba(62, 255, 158, 0.3);
        }

        .section-title {
            font-size: 0.7rem;
            font-weight: 600;
            margin-bottom: 6px;
            opacity: 0.9;
        }

        .letters-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 5px;
            margin: 6px 0 5px;
        }

        /* تصغير الحروف بشكل كبير جداً */
        .letter-item {
            background: linear-gradient(145deg, #9b4dff, #5e2a9c);
            display: inline-block;
            padding: 3px 8px;
            border-radius: 30px;
            font-weight: 800;
            font-size: 0.75rem;
            cursor: default;
            border: 1px solid #fff3bf;
            box-shadow: 0 2px 6px black;
            min-width: 32px;
            text-align: center;
        }

        .my-letter-glow {
            background: linear-gradient(145deg, #c471ff, #8a2be2);
            box-shadow: 0 0 5px #c471ff;
        }

        .opp-letter {
            background: linear-gradient(145deg, #b84c8c, #6b2e5a);
            opacity: 0.9;
        }

        .ans-item {
            background: rgba(25, 25, 55, 0.85);
            padding: 6px 10px;
            margin: 5px 0;
            border-radius: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-right: 3px solid #0ef;
            gap: 8px;
            flex-wrap: wrap;
            font-size: 0.75rem;
        }

        .action-area {
            background: rgba(0, 0, 0, 0.45);
            border-radius: 48px;
            padding: 14px 12px;
            margin-top: 12px;
            backdrop-filter: blur(8px);
        }

        .input-field {
            width: 100%;
            padding: 12px 16px;
            border-radius: 50px;
            border: 2px solid #ff8c5a;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            font-size: 0.9rem;
            outline: none;
            font-family: 'Cairo', sans-serif;
            margin-bottom: 10px;
        }

        .input-field:focus {
            border-color: #3effb5;
            box-shadow: 0 0 12px #3effb5;
        }

        .input-field:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-send {
            background: linear-gradient(135deg, #00f2fe, #4facfe);
            color: #121212;
            width: 100%;
            padding: 10px;
            font-size: 1rem;
            border: none;
            border-radius: 50px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Cairo', sans-serif;
        }

        .btn-send:active { transform: scale(0.97); }
        .btn-send:disabled {
            opacity: 0.5;
            transform: none;
            cursor: not-allowed;
        }

        .timer {
            font-size: 2rem;
            font-weight: 800;
            font-family: monospace;
            background: linear-gradient(135deg, cyan, #ff44cc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 12px cyan;
            margin-bottom: 10px;
        }

        .voting-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 5px;
        }

        .vote-btn {
            padding: 5px 15px;
            border-radius: 35px;
            border: none;
            font-weight: bold;
            color: white;
            cursor: pointer;
            font-size: 0.7rem;
        }

        .vote-accept { background: #00b894; box-shadow: 0 0 5px #00e6b8; }
        .vote-reject { background: #d63031; box-shadow: 0 0 5px #ff7675; }

        .btn-complete {
            background: linear-gradient(135deg, #f9f047, #f9a826);
            color: #1e1e2c;
            width: 100%;
            margin-top: 10px;
            font-weight: bold;
            font-size: 0.9rem;
            padding: 10px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.96);
            backdrop-filter: blur(24px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .result-card {
            background: linear-gradient(145deg, #1b1b3a, #26264b);
            padding: 25px 18px;
            border-radius: 60px;
            border: 2px solid gold;
            max-width: 300px;
            width: 85%;
            text-align: center;
        }

        .hidden { display: none !important; }
        .badge-light { font-size: 0.6rem; opacity: 0.8; margin-top: 5px; }

        @media (max-width: 550px) {
            .letter-item { padding: 2px 6px; font-size: 0.7rem; min-width: 28px; }
            .question-box { font-size: 0.9rem; }
            .score-value { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

<div id="lobby" class="card">
    <h2>✨ تحدي الحروف ✨</h2>
    <p style="margin: 6px 0 14px; font-size:0.8rem;">اكتب إجابة تبدأ بأحد حروفك .. وقيّم إجابات خصمك</p>
    <input type="number" id="roomInput" placeholder="🔢 كود الغرفة" style="text-align: center; width: 85%; margin-bottom: 14px; padding: 10px; border-radius: 50px; font-size:0.9rem;">
    <div style="display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;">
        <button class="btn" style="background:linear-gradient(135deg,#ff758c,#ff7eb3); color:#121212; width: 150px; padding:8px; border:none; border-radius:50px; font-weight:bold; font-size:0.85rem;" onclick="createRoom()">🌟 إنشاء غرفة</button>
        <button class="btn" style="background:linear-gradient(135deg,#43e97b,#38f9d7); color:#121212; width: 150px; padding:8px; border:none; border-radius:50px; font-weight:bold; font-size:0.85rem;" onclick="setupRoom('guest')">🎮 انضمام</button>
    </div>
</div>

<div id="game-screen" class="card hidden">
    <div class="room-info">
        <span>🆔 <strong id="roomCodeText">----</strong></span>
        <button class="btn-copy" onclick="copyCode()">📋 نسخ</button>
    </div>

    <div class="score-panel">
        <div class="score-card"><span>🔥 نقاطي</span> <span class="score-value" id="my-score">0</span></div>
        <div class="score-card"><span>🌀 الخصم</span> <span class="score-value" id="opp-score">0</span></div>
    </div>

    <div id="game-elements" class="hidden">
        <div class="dual-layout">
            <div class="opponent-section">
                <div class="section-title">⭐ حروف الخصم</div>
                <div id="opp-letters" class="letters-container"></div>
                <hr style="margin: 8px 0; border-color:#ff66c0;">
                <div class="section-title">⚖️ تقييم إجابات الخصم</div>
                <div id="opponent-answers-evaluation"></div>
            </div>

            <div class="my-section">
                <div class="section-title">💎 حروفي (ابدأ بأي حرف)</div>
                <div id="my-letters" class="letters-container"></div>
                <hr style="margin: 8px 0; border-color:#3eff9e;">
                <div class="section-title">📝 إجاباتي</div>
                <div id="my-ans-list"></div>
            </div>
        </div>

        <div id="action-area" class="action-area">
            <div id="timer-display" class="timer">30</div>
            <!-- السؤال الآن فوق زر الإرسال -->
            <div id="question-area" class="question-box" style="margin: 8px 0 12px 0;">✨ بانتظار البدء...</div>
            <input type="text" id="ansInput" class="input-field" placeholder="✏️ اكتب إجابة تبدأ بأحد حروفك..." maxlength="80">
            <button class="btn-send" id="sendBtn" onclick="submitAns()">📤 إرسال الإجابة</button>
            <div class="badge-light">⚡ الحرف الأول من إجابتك يجب أن يكون ضمن حروفك</div>
        </div>
    </div>

    <div id="host-controls" class="hidden">
        <button class="btn-complete" onclick="nextRound()">🎲 السؤال التالي 🎲</button>
    </div>
</div>

<div id="result-overlay" class="overlay hidden">
    <div class="result-card">
        <div id="win-ui" class="hidden"><h1 style="font-size:1.8rem;">🏆 فوز!</h1><p>عبقري الحروف 🌟</p></div>
        <div id="lose-ui" class="hidden"><h1 style="font-size:1.8rem;">💥 خسارة</h1><p>حاول مجدداً 💪</p></div>
        <button class="btn" style="background:linear-gradient(135deg,#ff6a88,#f09819); color:#121212; width:100%; margin-top:16px; padding:8px; border:none; border-radius:50px; font-weight:bold;" onclick="location.reload()">🏠 الرئيسية</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCTKYD680Jdbl0azC9RTtuKZBaLX2uU_Ck",
        authDomain: "my-online-store-34f34.firebaseapp.com",
        databaseURL: "https://my-online-store-34f34-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "my-online-store-34f34",
        storageBucket: "my-online-store-34f34.firebasestorage.app",
        messagingSenderId: "288655549705",
        appId: "1:288655549705:web:06901ce4ac1a50eebe1fd8"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let rId, myRole, oppRole, timerInterval = null;
    const alphabet = "أبتثجحخدذرزسشصضطظعغفقكلمنهوي";
    
    const QUESTIONS_BANK = [
        "وش الحاجة اللي كلنا نقولها بكرة وما نبداوهاش؟ 😂", "إذا رجعت للوراء وش أول غلط تصلحه؟", "وش أسوأ شي ممكن يصير في العرس؟ 💃",
        "واش تحس كي تشوف البطارية 1%؟", "وش الحاجة اللي تضيع منك كل نهار؟ 🔑", "أغرب عذر سمعته عشان واحد يتغيب؟",
        "وش الشي اللي تخاف تقوله لأهلك؟", "وش اللي كل مرة تقول آخر مرة وترجع؟ 🤦", "إذا تقدر تصير حيوان نهار واحد وش تختار؟",
        "أطرف موقف صارلك مع التوصيل؟", "وش الحاجة اللي تندم عليها بعد الشراء؟", "كلمة جزائرية مضحكة بزاف؟",
        "وش اللي لو إنسان كان يكرهك؟", "وش الحاجة اللي تحبها وما تعترفش؟", "إذا تتحول لشبح ساعة وش أول حاجة تديرها؟ 👻"
    ];

    function generateLetters() {
        let shuffled = alphabet.split('').sort(() => Math.random() - 0.5);
        return shuffled.slice(0, 7);
    }

    function createRoom() {
        const code = Math.floor(1000 + Math.random() * 9000);
        document.getElementById('roomInput').value = code;
        setupRoom('host');
    }

    function setupRoom(role) {
        let codeInput = document.getElementById('roomInput').value.trim();
        if (!codeInput) return alert("أدخل كود الغرفة!");
        rId = codeInput;
        myRole = role;
        oppRole = (role === 'host') ? 'guest' : 'host';
        document.getElementById('roomCodeText').innerText = rId;
        
        if (role === 'host') {
            const randomQ = QUESTIONS_BANK[Math.floor(Math.random() * QUESTIONS_BANK.length)];
            db.ref('rooms/' + rId).set({
                hostL: generateLetters(),
                guestL: generateLetters(),
                status: 'waiting',
                q: randomQ,
                ans: { host: [], guest: [] },
                scores: { host: 0, guest: 0 },
                timeLeft: 30,
            }).catch(e => alert("خطأ بالاتصال"));
        } else {
            db.ref('rooms/' + rId).update({ status: 'playing' });
        }
        document.getElementById('lobby').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        startListening();
    }

    function startListening() {
        db.ref('rooms/' + rId).on('value', (snap) => {
            const data = snap.val();
            if (!data) return;
            document.getElementById('my-score').innerText = data.scores[myRole] || 0;
            document.getElementById('opp-score').innerText = data.scores[oppRole] || 0;

            const myScore = data.scores[myRole] || 0;
            const oppScore = data.scores[oppRole] || 0;
            const myLettersArr = data[myRole + 'L'] || [];
            const oppLettersArr = data[oppRole + 'L'] || [];
            
            if (myScore >= 15 || myLettersArr.length === 0) { showResult(true); return; }
            if (oppScore >= 15 || oppLettersArr.length === 0) { showResult(false); return; }

            if (data.status === 'waiting') {
                document.getElementById('question-area').innerHTML = "⏳ في انتظار الخصم ...";
                document.getElementById('game-elements').classList.add('hidden');
                return;
            }

            document.getElementById('game-elements').classList.remove('hidden');
            // تحديث السؤال في مكانه الجديد
            document.getElementById('question-area').innerHTML = "🎤 " + data.q;
            document.getElementById('timer-display').innerText = data.timeLeft;
            
            renderOppLetters(data[oppRole + 'L'] || []);
            renderMyLetters(data[myRole + 'L'] || []);
            
            const myAnswers = data.ans ? data.ans[myRole] : [];
            document.getElementById('my-ans-list').innerHTML = myAnswers.map(a => `
                <div class="ans-item"><span>📌 ${escapeHtml(a.text)}</span> <span style="font-size:0.65rem;">${a.status === 'accepted' ? '✅ مقبولة' : (a.status === 'rejected' ? '❌ مرفوضة' : '⏳ تنتظر')}</span></div>
            `).join('');
            
            const oppAnswers = data.ans ? data.ans[oppRole] : [];
            const evaluationDiv = document.getElementById('opponent-answers-evaluation');
            const inputField = document.getElementById('ansInput');
            const sendBtn = document.getElementById('sendBtn');
            
            if (data.timeLeft === 0) {
                inputField.disabled = true;
                sendBtn.disabled = true;
                inputField.placeholder = "⏰ انتهى الوقت! قيّم إجابات الخصم";
                
                const pendingOpp = oppAnswers.filter(a => a.status === 'pending');
                if (pendingOpp.length > 0) {
                    let html = `<div style="margin-bottom:6px; font-weight:bold; font-size:0.75rem;">🎭 قيّم إجابات الخصم:</div>`;
                    pendingOpp.forEach(ans => {
                        html += `
                            <div class="ans-item" style="flex-direction:column; align-items:stretch;">
                                <span>💬 "${escapeHtml(ans.text)}"</span>
                                <div class="voting-buttons">
                                    <button class="vote-btn vote-accept" onclick="voteAnswer('${escapeHtml(ans.text)}', 'accepted')">✅ صحيحة (+1)</button>
                                    <button class="vote-btn vote-reject" onclick="voteAnswer('${escapeHtml(ans.text)}', 'rejected')">❌ خاطئة</button>
                                </div>
                            </div>
                        `;
                    });
                    evaluationDiv.innerHTML = html;
                } else {
                    evaluationDiv.innerHTML = "<div class='badge-light'>✅ تم تقييم جميع الإجابات.</div>";
                }
                
                if (myRole === 'host') document.getElementById('host-controls').classList.remove('hidden');
                else document.getElementById('host-controls').classList.add('hidden');
                document.getElementById('action-area').style.opacity = '0.7';
            } else {
                inputField.disabled = false;
                sendBtn.disabled = false;
                inputField.placeholder = "✏️ اكتب إجابة تبدأ بأحد حروفك...";
                evaluationDiv.innerHTML = "<div class='badge-light'>⏳ بعد انتهاء الوقت، قيّم إجابات خصمك.</div>";
                document.getElementById('action-area').style.opacity = '1';
                document.getElementById('host-controls').classList.add('hidden');
                if (myRole === 'host' && !timerInterval) startTimerSync();
            }
        });
    }

    function renderMyLetters(letters) {
        const container = document.getElementById('my-letters');
        if (!letters.length) { container.innerHTML = "<span style='font-size:0.7rem;'>🎉 فوز!</span>"; return; }
        container.innerHTML = letters.map(l => `<span class="letter-item my-letter-glow">${l}</span>`).join('');
    }

    function renderOppLetters(letters) {
        const container = document.getElementById('opp-letters');
        if (!letters.length) { container.innerHTML = "<span style='font-size:0.7rem;'>💀 انتهت</span>"; return; }
        container.innerHTML = letters.map(l => `<span class="letter-item opp-letter">${l}</span>`).join('');
    }

    function submitAns() {
        const text = document.getElementById('ansInput').value.trim();
        if (!text) return alert("✏️ اكتب إجابة!");
        const firstChar = text[0];
        
        db.ref(`rooms/${rId}/${myRole}L`).once('value', snap => {
            const myLetters = snap.val() || [];
            if (!myLetters.includes(firstChar)) {
                return alert(`⚠️ الإجابة يجب أن تبدأ بأحد حروفك: ${myLetters.join(' - ')}`);
            }
            db.ref(`rooms/${rId}/ans/${myRole}`).once('value', snapAns => {
                let list = snapAns.val() || [];
                list.push({ text: text, letter: firstChar, status: 'pending' });
                db.ref(`rooms/${rId}/ans/${myRole}`).set(list);
                document.getElementById('ansInput').value = "";
            });
        });
    }

    window.voteAnswer = function(text, verdict) {
        db.ref(`rooms/${rId}/ans/${oppRole}`).once('value', snap => {
            let list = snap.val() || [];
            const idx = list.findIndex(a => a.text === text && a.status === 'pending');
            if (idx === -1) return;
            list[idx].status = verdict;
            if (verdict === 'accepted') {
                db.ref(`rooms/${rId}/scores/${oppRole}`).transaction(s => (s || 0) + 1);
                db.ref(`rooms/${rId}/${oppRole}L`).once('value', snapL => {
                    let letters = snapL.val() || [];
                    const letterUsed = list[idx].letter;
                    const pos = letters.indexOf(letterUsed);
                    if (pos !== -1) {
                        letters.splice(pos, 1);
                        db.ref(`rooms/${rId}/${oppRole}L`).set(letters);
                    }
                });
            }
            db.ref(`rooms/${rId}/ans/${oppRole}`).set(list);
        });
    };

    function startTimerSync() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            db.ref(`rooms/${rId}/timeLeft`).transaction(current => {
                if (current && current > 0) return current - 1;
                else if (current === 0) return 0;
                else return 30;
            });
        }, 1000);
    }

    function nextRound() {
        if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
        const newQuestion = QUESTIONS_BANK[Math.floor(Math.random() * QUESTIONS_BANK.length)];
        db.ref('rooms/' + rId).update({
            timeLeft: 30,
            q: newQuestion,
            ans: { host: [], guest: [] }
        }).then(() => startTimerSync());
    }

    function showResult(isWinner) {
        if (timerInterval) clearInterval(timerInterval);
        const overlay = document.getElementById('result-overlay');
        document.getElementById('win-ui').classList.toggle('hidden', !isWinner);
        document.getElementById('lose-ui').classList.toggle('hidden', isWinner);
        overlay.classList.remove('hidden');
    }

    function copyCode() {
        if (rId) { navigator.clipboard.writeText(rId); alert("تم نسخ الكود: " + rId); }
    }
    
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    window.addEventListener('beforeunload', ()=>{
        if(timerInterval) clearInterval(timerInterval);
    });
</script>
</body>
</html>
