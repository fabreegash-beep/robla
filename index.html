<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>روبلة | المنصة الكاملة</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* التنسيقات المشتركة */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(145deg, #0a0f1e 0%, #0f172a 100%);
            color: #f8fafc;
            text-align: center;
            padding: 20px 16px;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .bg-glow { position: fixed; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; z-index: -1; background: radial-gradient(circle at 20% 40%, rgba(108, 92, 231, 0.2), transparent 70%); }
        .hidden { display: none !important; }

        /* ستايل الشاشة الرئيسية */
        #splash-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 90vh;
            animation: fadeIn 0.8s ease-out;
        }
        .main-logo-icon { font-size: 5rem; margin-bottom: 20px; filter: drop-shadow(0 0 20px #6c5ce7); }
        .btn-main-choice {
            width: 280px;
            margin: 10px;
            padding: 20px;
            font-size: 1.5rem;
            font-weight: 900;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
            color: white;
            border-bottom: 6px solid rgba(0,0,0,0.3);
        }
        .btn-classic { background: linear-gradient(135deg, #6c5ce7, #a29bfe); }
        .btn-letters { background: linear-gradient(135deg, #00cec9, #81ecec); color: #0f172a; }
        .btn-main-choice:hover { transform: scale(1.05) translateY(-5px); }

        /* ستايل اللعب */
        .card { background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(18px); border-radius: 48px; padding: 28px 24px; max-width: 1100px; margin: 20px auto; border: 1px solid rgba(255, 255, 255, 0.15); box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.5); }
        h2 { font-size: 2rem; font-weight: 800; background: linear-gradient(135deg, #a5b4fc, #ffb8b8); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 12px; }
        .room-info { background: #1e293bb3; padding: 12px 24px; border-radius: 100px; display: inline-flex; align-items: center; gap: 20px; margin-bottom: 24px; border: 1px solid #6c5ce7; font-weight: 600; }
        .score-panel { display: flex; justify-content: space-between; align-items: center; gap: 12px; background: rgba(0, 0, 0, 0.35); padding: 12px 20px; border-radius: 80px; margin-bottom: 25px; }
        .score-card { background: #0f172a; padding: 8px 20px; border-radius: 50px; display: flex; align-items: baseline; gap: 8px; font-weight: bold; font-size: 1.2rem; border: 1px solid #334155; }
        .score-value { color: #facc15; font-size: 1.8rem; font-weight: 800; }
        .timer { font-size: 3rem; font-weight: 800; font-family: monospace; color: #ffb347; }
        .question-box { background: linear-gradient(120deg, #6c5ce7, #4a3bb5); padding: 24px 20px; border-radius: 40px; margin: 20px 0; font-size: 1.5rem; font-weight: 700; border-bottom: 4px solid #ffd966; }
        .grid-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 25px 0; }
        .box { background: rgba(0, 0, 0, 0.35); border-radius: 32px; padding: 18px; border: 1px solid rgba(108, 92, 231, 0.5); }
        .letter-item { display: inline-block; background: linear-gradient(145deg, #4834d4, #2c1f9e); margin: 4px; padding: 10px 18px; border-radius: 15px; font-weight: 800; font-size: 1.4rem; cursor: pointer; transition: 0.2s; border: 2px solid transparent; }
        .letter-item.selected { background: #facc15 !important; color: #0f172a !important; transform: scale(1.1); box-shadow: 0 0 15px #facc15; }
        .ans-item { background: #1e293b; padding: 10px 14px; margin: 8px 0; border-radius: 50px; display: flex; justify-content: space-between; align-items: center; border-right: 5px solid #6c5ce7; }
        input { padding: 16px 20px; border-radius: 60px; border: 2px solid #6c5ce7; width: 70%; background: #0f172a; color: white; font-size: 1rem; outline: none; }
        .btn { padding: 12px 24px; border-radius: 50px; border: none; font-weight: 800; cursor: pointer; transition: 0.2s; font-size: 1rem; }
        .btn-send { background: #55efc4; color: #0f172a; width: 25%; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95); z-index: 10000; display: flex; justify-content: center; align-items: center; }
        .result-card { background: #1e293b; padding: 30px; border-radius: 60px; border: 2px solid #6c5ce7; max-width: 450px; width: 90%; text-align: center; }
        
        @media (max-width: 700px) { .grid-layout { grid-template-columns: 1fr; } input { width: 60%; } .btn-send { width: 35%; } }
    </style>
</head>
<body>
<div class="bg-glow"></div>

<div id="splash-screen">
    <span class="main-logo-icon">⚡</span>
    <h1 style="margin-bottom: 30px;">اختر نمط اللعب</h1>
    <button class="btn-main-choice btn-classic" onclick="initMode('classic')">روبلة كلاسيك</button>
    <button class="btn-main-choice btn-letters" onclick="initMode('letters')">روبلة الحروف السحرية</button>
</div>

<div id="lobby" class="card hidden">
    <h2 id="lobby-title">تحميل...</h2>
    <p id="lobby-desc" style="margin-bottom: 20px; color: #cbd5e6;"></p>
    <input type="number" id="roomInput" placeholder="🔢 كود الغرفة" style="text-align: center; width: 80%; margin-bottom: 18px;">
    <div style="display: flex; flex-wrap: wrap; gap: 14px; justify-content: center;">
        <button class="btn" style="background:#6c5ce7; color:white; width: 210px;" onclick="createRoom()">🚀 إنشاء غرفة</button>
        <button class="btn" style="background:#00cec9; color:#0f172a; width: 210px;" onclick="setupRoom('guest')">🔗 انضمام لصديق</button>
    </div>
</div>

<div id="game-screen" class="card hidden">
    <div class="room-info">
        <span>🆔 كود: <strong id="roomCodeText">----</strong></span>
        <button class="btn" style="padding:5px 15px; font-size:0.8rem; background:#6c5ce7; color:white;" onclick="copyCode()">📋 نسخ</button>
    </div>

    <div class="score-panel">
        <div class="score-card"><span>🌟 نقاطي</span> <span class="score-value" id="my-score">0</span></div>
        <div id="timer-display" class="timer">30</div>
        <div class="score-card"><span>👾 الخصم</span> <span class="score-value" id="opp-score">0</span></div>
    </div>

    <div id="question-area" class="question-box">📢 بانتظار الخصم...</div>

    <div id="game-elements" class="hidden">
        <div class="grid-layout">
            <div class="box">
                <div style="display: flex; justify-content: space-between;"><small id="my-box-label">🪄 حروفي:</small></div>
                <div id="my-letters" style="margin: 12px 0;"></div>
                <hr style="border-color:#334155; margin: 12px 0;">
                <div id="my-ans-list"></div>
            </div>
            <div class="box">
                <div><small id="opp-box-label">🧩 حروف الخصم:</small></div>
                <div id="opp-letters" style="margin: 12px 0;"></div>
                <hr style="border-color:#334155; margin: 12px 0;">
                <div id="voting-panel"></div>
            </div>
        </div>

        <div id="action-area">
            <input type="text" id="ansInput" placeholder="اكتب إجابتك هنا..." maxlength="70">
            <button class="btn btn-send" onclick="submitAns()">إرسال ✈️</button>
        </div>
    </div>

    <div id="host-controls" class="hidden">
        <button class="btn" style="background:#f1c40f; width:100%; margin-top:10px;" onclick="nextRound()">➡️ السؤال التالي ⏩</button>
    </div>
</div>

<div id="result-overlay" class="overlay hidden">
    <div class="result-card">
        <div id="win-ui" class="hidden"><h1>🏆 فوز ساحق!</h1></div>
        <div id="lose-ui" class="hidden"><h1>😭 هارد لك!</h1></div>
        <button class="btn" style="background:#6c5ce7; color:white; width:100%; margin-top:20px;" onclick="location.reload()">العودة للرئيسية</button>
    </div>
</div>

<script>
    // الإعدادات وقاعدة البيانات
    const firebaseConfig = {
        apiKey: "AIzaSyCTKYD680Jdbl0azC9RTtuKZBaLX2uU_Ck",
        authDomain: "my-online-store-34f34.firebaseapp.com",
        databaseURL: "https://my-online-store-34f34-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "my-online-store-34f34",
        storageBucket: "my-online-store-34f34.firebasestorage.app",
        messagingSenderId: "288655549705",
        appId: "1:288655549705:web:d3a33fa537ee1793be1fd8"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let rId, myRole, oppRole, currentGameMode = 'classic', selectedLetter = null, timerInterval = null;
    const alphabet = "أبتثجحخدذرزسشصضطظعغفقكلمنهوي";

    const QUESTIONS_BANK = ["واش الحاجة لي إذا طاحت في الدار كامل يخافو منها؟ 😅", "واش أول حاجة ديرها كي ينقطع الضوء؟ 💡", "وش هو أغرب عذر سمعتو باش واحد ما يخدمش؟ 🤣", "إذا تصبح رئيس نهار واحد، وش أول قرار غبي تديرو؟ 👑", "وش الحاجة لي تقولها قدام الناس وتندم عليها بعد؟ 😬", "إذا صاحبك يطلب منك 1000 دج وما يرجعهمش؟ 💸", "وش هو أتعس فطور فالعالم؟ 🥲", "إذا يدوك للعرس غصب عليك، وش تدير باش تهرب؟ 😂", "وش الحاجة لي تخليك تضحك بلا سبب؟", "إذا تشوف روحك في المنام، وش تقول لنفسك؟ 😵", "وش أكثر كلمة يقولها الجزائري كي يتعصب؟ 😡", "وش الحاجة لي دايماً تكون غالية بزاف؟ 💰", "وش أكثر حاجة تتقال في الأعراس؟ 💃", "وش الحاجة لي نكذبو فيها كامل؟ 🤥", "وش الحاجة لي كل واحد يقول غدوة نبدأ فيها وما يبدأش؟ 😴", "وش أكثر حاجة تخاف منها كي تكون صغير؟ 👻", "وش الحاجة لي تشريها وما تستعملهاش؟ 🛒", "وش أكثر جملة يقولها الأستاذ؟ 🧑‍🏫", "وش الحاجة لي كل واحد يدير فيها روحو فاهم؟ 😏", "إذا لازم تعيش مع حيوان، وش تختار؟ 🐒", "إذا صاحبك صار غني، وش تطلب منو؟ 😂", "وش الحاجة لي ما تقبلش تديرها قدام الناس؟ 🙈", "إذا يعطيولك مليار باش تدير حاجة محرجة؟ 💰", "وش الحاجة لي لو كانت إنسان تكرهها؟ 😆", "إذا تقدر تمسح موقف محرج، وش هو؟", "وش الحاجة لي دايماً تضيعها؟ 🔍", "وش أكثر حاجة تقول آخر مرة وتعاودها؟ 🤦‍♂️", "إذا تكون غير مرئي نهار كامل، وش تدير؟ 👻"];

    function initMode(mode) {
        currentGameMode = mode;
        document.getElementById('splash-screen').classList.add('hidden');
        document.getElementById('lobby').classList.remove('hidden');
        
        if(mode === 'classic') {
            document.getElementById('lobby-title').innerText = "⚡ تحدي الـ 15 نقطة";
            document.getElementById('lobby-desc').innerText = "أجب بأي شيء واجمع 15 نقطة لتفوز!";
            document.getElementById('my-box-label').innerText = "🎲 حروفي السحرية:";
            document.getElementById('ansInput').placeholder = "اكتب إجابة إبداعية...";
        } else {
            document.getElementById('lobby-title').innerText = "🪄 تحدي الحروف السحرية";
            document.getElementById('lobby-desc').innerText = "اختر حرفاً، ابدأ به إجابتك، وتخلص من حروفك للفوز!";
            document.getElementById('my-box-label').innerText = "🪄 اختر حرفاً لتبدأ به:";
            document.getElementById('ansInput').placeholder = "إجابة تبدأ بالحرف المختار...";
        }
    }

    function generateLetters() {
        return Array.from({length: 7}, () => alphabet[Math.floor(Math.random() * alphabet.length)]);
    }

    function createRoom() {
        const code = Math.floor(1000 + Math.random() * 9000);
        document.getElementById('roomInput').value = code;
        setupRoom('host');
    }

    function setupRoom(role) {
        rId = document.getElementById('roomInput').value.trim();
        if (!rId) return alert("أدخل الكود");
        myRole = role;
        oppRole = (role === 'host') ? 'guest' : 'host';
        document.getElementById('roomCodeText').innerText = rId;

        if (role === 'host') {
            db.ref('rooms/' + rId).set({
                mode: currentGameMode,
                hostL: generateLetters(),
                guestL: generateLetters(),
                status: 'waiting',
                q: QUESTIONS_BANK[Math.floor(Math.random() * QUESTIONS_BANK.length)],
                ans: { host: [], guest: [] },
                scores: { host: 0, guest: 0 },
                timeLeft: 30
            });
        } else {
            db.ref('rooms/' + rId).update({ status: 'playing' });
        }
        document.getElementById('lobby').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        startListening();
    }

    function startListening() {
        db.ref('rooms/' + rId).on('value', (snap) => {
            const data = snap.val();
            if (!data) return;
            currentGameMode = data.mode;

            document.getElementById('my-score').innerText = data.scores[myRole] || 0;
            document.getElementById('opp-score').innerText = data.scores[oppRole] || 0;

            if (data.status === 'waiting') {
                document.getElementById('question-area').innerText = "⏳ بانتظار دخول الخصم...";
                document.getElementById('game-elements').classList.add('hidden');
                return;
            }

            document.getElementById('game-elements').classList.remove('hidden');
            document.getElementById('question-area').innerText = "📢 " + data.q;
            document.getElementById('timer-display').innerText = data.timeLeft;

            renderLettersDisplay('my-letters', data[myRole + 'L'] || [], true);
            renderLettersDisplay('opp-letters', data[oppRole + 'L'] || [], false);

            // منطق الفوز
            let iWin = (currentGameMode === 'letters') ? (data[myRole+'L'] && data[myRole+'L'].length === 0) : (data.scores[myRole] >= 15);
            let oppWins = (currentGameMode === 'letters') ? (data[oppRole+'L'] && data[oppRole+'L'].length === 0) : (data.scores[oppRole] >= 15);

            if (iWin) showResult(true);
            else if (oppWins) showResult(false);

            if (data.timeLeft === 0) {
                document.getElementById('action-area').classList.add('hidden');
                if (myRole === 'host') document.getElementById('host-controls').classList.remove('hidden');
                renderVotingPanel(data.ans ? data.ans[oppRole] : []);
            } else {
                document.getElementById('action-area').classList.remove('hidden');
                document.getElementById('host-controls').classList.add('hidden');
                document.getElementById('voting-panel').innerHTML = "";
                if (myRole === 'host') startTimerSync();
            }

            const myAns = data.ans ? data.ans[myRole] : [];
            document.getElementById('my-ans-list').innerHTML = (myAns || []).map(a => `
                <div class="ans-item"><span>${a.text}</span><small>${a.status === 'accepted' ? '✅' : (a.status === 'rejected' ? '❌' : '⏳')}</small></div>
            `).join('');
        });
    }

    function renderLettersDisplay(elId, letters, clickable) {
        const container = document.getElementById(elId);
        const isOpponent = !clickable; // إذا لم تكن قابلة للضغط فهي للخصم
        
        container.innerHTML = letters.map(l => {
            let classes = "letter-item";
            if (isOpponent) classes += " opp-style"; // إضافة ستايل الخصم الصغير
            if (selectedLetter === l && clickable) classes += " selected";
            
            return `<span class="${classes}" 
                  onclick="${clickable && currentGameMode === 'letters' ? `selectLetter('${l}')` : ''}">${l}</span>`;
        }).join('');
    }

    function selectLetter(l) {
        selectedLetter = l;
        db.ref(`rooms/${rId}/${myRole}L`).once('value', s => renderLettersDisplay('my-letters', s.val(), true));
    }

    function submitAns() {
        if (currentGameMode === 'letters' && !selectedLetter) return alert("⚠️ اختر حرفاً أولاً!");
        const text = document.getElementById('ansInput').value.trim();
        if (!text) return;
        if (currentGameMode === 'letters' && !text.startsWith(selectedLetter)) return alert(`يجب البدء بحرف ${selectedLetter}`);

        db.ref(`rooms/${rId}/ans/${myRole}`).once('value', snap => {
            let list = snap.val() || [];
            list.push({ text: text, letter: selectedLetter, status: 'pending' });
            db.ref(`rooms/${rId}/ans/${myRole}`).set(list);
            document.getElementById('ansInput').value = "";
            selectedLetter = null;
        });
    }

    function renderVotingPanel(oppAnswers) {
        const container = document.getElementById('voting-panel');
        const pending = (oppAnswers || []).filter(a => a.status === 'pending');
        if (pending.length === 0) return container.innerHTML = "<small>انتظار الخصم...</small>";
        
        container.innerHTML = "<h4>تقييم الخصم:</h4>";
        pending.forEach(ans => {
            container.innerHTML += `
                <div class="ans-item">
                    <span style="font-size:0.9rem">${ans.text}</span>
                    <button class="btn" style="background:#55efc4; padding:5px 10px;" onclick="vote('${ans.text}', 'accepted')">✅</button>
                    <button class="btn" style="background:#ff7675; padding:5px 10px;" onclick="vote('${ans.text}', 'rejected')">❌</button>
                </div>
            `;
        });
    }

    window.vote = function(text, status) {
        db.ref(`rooms/${rId}/ans/${oppRole}`).once('value', snap => {
            let list = snap.val();
            let idx = list.findIndex(a => a.text === text);
            if (idx > -1) {
                list[idx].status = status;
                if (status === 'accepted') {
                    db.ref(`rooms/${rId}/scores/${oppRole}`).transaction(s => (s || 0) + 1);
                    if(currentGameMode === 'letters') {
                        db.ref(`rooms/${rId}/${oppRole}L`).once('value', sL => {
                            let letters = sL.val();
                            let lIdx = letters.indexOf(list[idx].letter);
                            if (lIdx > -1) { letters.splice(lIdx, 1); db.ref(`rooms/${rId}/${oppRole}L`).set(letters); }
                        });
                    }
                }
                db.ref(`rooms/${rId}/ans/${oppRole}`).set(list);
            }
        });
    }

    function startTimerSync() {
        if (timerInterval) return;
        timerInterval = setInterval(() => {
            db.ref(`rooms/${rId}/timeLeft`).transaction(t => (t > 0 ? t - 1 : 0));
        }, 1000);
    }

    function nextRound() {
        db.ref('rooms/' + rId).update({
            timeLeft: 30,
            q: QUESTIONS_BANK[Math.floor(Math.random() * QUESTIONS_BANK.length)],
            ans: { host: [], guest: [] }
        });
    }

    function showResult(win) {
        document.getElementById('result-overlay').classList.remove('hidden');
        document.getElementById('win-ui').classList.toggle('hidden', !win);
        document.getElementById('lose-ui').classList.toggle('hidden', win);
    }

    function copyCode() {
        navigator.clipboard.writeText(rId);
        alert("تم نسخ الكود!");
    }
</script>
</body>
</html>
