<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تحدي الـ 15 نقطة - نسخة الهاتف</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --accent: #ff7675; --main: #6c5ce7; --bg: #0f172a; --success: #55efc4; --danger: #ff4757; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Cairo', sans-serif; 
            background: var(--bg); 
            color: white; 
            text-align: center; 
            margin: 0; 
            padding: 10px; 
            touch-action: manipulation;
        }

        .card { 
            background: rgba(255,255,255,0.05); 
            padding: 15px; 
            border-radius: 20px; 
            max-width: 500px; 
            margin: 5px auto; 
            border: 1px solid rgba(255,255,255,0.1); 
            backdrop-filter: blur(15px); 
        }

        .timer { font-size: 35px; font-weight: bold; color: var(--accent); margin: 5px 0; }
        
        .room-info { 
            background: #1e293b; 
            padding: 8px 15px; 
            border-radius: 50px; 
            display: inline-flex; 
            align-items: center; 
            gap: 10px; 
            margin-bottom: 10px; 
            font-size: 14px;
            border: 1px solid var(--main); 
        }

        .question-box { 
            background: var(--main); 
            padding: 15px; 
            border-radius: 15px; 
            margin: 10px 0; 
            font-size: 18px; 
            font-weight: bold; 
            line-height: 1.4;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3);
        }

        /* تحسين الشبكة للهاتف */
        .grid-layout { 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            margin-bottom: 15px; 
        }

        .box { 
            background: rgba(0,0,0,0.3); 
            padding: 12px; 
            border-radius: 15px; 
            border: 1px solid #334155; 
            min-height: 120px; 
        }

        .ans-item { 
            background: #1e293b; 
            padding: 8px; 
            margin: 5px 0; 
            border-radius: 8px; 
            font-size: 14px;
            display: flex; 
            justify-content: space-between; 
            border-right: 3px solid var(--main); 
        }

        .letter-item { 
            display: inline-block; 
            background: #4834d4; 
            margin: 2px; 
            padding: 4px 10px; 
            border-radius: 6px; 
            font-weight: bold; 
            font-size: 16px; 
        }

        /* تحسين منطقة الإدخال */
        .input-group {
            display: flex;
            gap: 5px;
            position: sticky;
            bottom: 10px;
        }

        input { 
            padding: 12px; 
            border-radius: 12px; 
            border: 2px solid var(--main); 
            flex: 1; 
            background: #1e293b; 
            color: white; 
            font-size: 16px; 
            outline: none; 
        }

        .btn { 
            padding: 12px 15px; 
            border-radius: 12px; 
            border: none; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 16px;
            transition: transform 0.1s;
        }
        
        .btn:active { transform: scale(0.95); }

        .btn-send { background: var(--success); color: #000; min-width: 80px; }
        
        .btn-complete { 
            background: #f1c40f; 
            color: #000; 
            width: 100%; 
            font-size: 20px; 
            margin-top: 10px; 
        }

        .hidden { display: none !important; }

        /* لافتات الهاتف */
        #result-overlay, #review-overlay { 
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background:rgba(0,0,0,0.9); z-index:10000; 
            display:flex; justify-content:center; align-items:center; 
            padding: 20px;
        }

        .result-card { 
            background:#1e293b; padding:25px; border-radius:25px; 
            border:2px solid var(--main); width:100%; max-width:350px; 
        }

        .emoji-big { font-size: 60px; display:block; }
        
        .review-list { text-align: right; max-height: 250px; overflow-y: auto; }
    </style>
</head>
<body>

    <div id="lobby" class="card">
        <h2 style="margin-top:0">⚔️ تحدي الـ 15</h2>
        <p style="font-size:14px; opacity:0.8">أدخل الكود أو أنشئ غرفة</p>
        <input type="number" id="roomInput" placeholder="كود الغرفة" pattern="\[0-9]*" inputmode="numeric">
        <div style="margin-top:15px; display:flex; flex-direction:column; gap:10px;">
            <button class="btn" style="background:var(--main); color:white;" onclick="createRoom()">إنشاء غرفة جديدة 🚀</button>
            <button class="btn" style="background:#00cec9; color:white;" onclick="setupRoom('guest')">انضمام لصديق 🔗</button>
        </div>
    </div>

    <div id="game-screen" class="card hidden">
        <div class="room-info">
            <span>الكود: <strong id="roomCodeText">....</strong></span>
            <button style="background:none; border:none; color:var(--success); font-size:12px;" onclick="copyCode()">نسخ 📋</button>
        </div>

        <div style="display:flex; justify-content: space-around; font-weight:bold; font-size:14px;">
            <div style="color:var(--success)">أنا: <span id="my-score">0</span></div>
            <div id="timer-display" class="timer">30</div>
            <div style="color:var(--accent)">الخصم: <span id="opp-score">0</span></div>
        </div>

        <div id="question-area" class="question-box">السؤال سيظهر هنا...</div>

        <div class="grid-layout">
            <div class="box">
                <small>حروفي ✨</small><div id="my-letters"></div>
                <div id="my-ans-list" style="margin-top:10px"></div>
            </div>
            <div class="box">
                <small>تقييم إجابات الخصم 👤</small>
                <div id="opp-letters"></div>
                <div id="voting-panel" style="margin-top:10px"></div>
            </div>
        </div>

        <div id="action-area" class="input-group">
            <input type="text" id="ansInput" placeholder="أجب هنا..." autocomplete="off">
            <button class="btn btn-send" onclick="submitAns()">إرسال</button>
        </div>

        <div id="host-controls" class="hidden">
            <button class="btn btn-complete" onclick="nextRound()">السؤال التالي ➡️</button>
        </div>
    </div>

    <div id="result-overlay" class="hidden">
        <div class="result-card">
            <div id="win-ui" class="hidden">
                <span class="emoji-big">🎉</span>
                <h2 style="color:var(--success)">بطل! فزت</h2>
            </div>
            <div id="lose-ui" class="hidden">
                <span class="emoji-big">😢</span>
                <h2 style="color:var(--danger)">خسرت الجولة</h2>
            </div>
            <div style="display:flex; flex-direction:column; gap:8px; margin-top:20px;">
                <button class="btn" style="background:var(--main); color:white;" onclick="resetGameFull()">🔄 جولة جديدة</button>
                <button class="btn" style="background:#4834d4; color:white;" onclick="showReview()">📝 كشف الأجوبة</button>
                <button class="btn" style="background:white; color:black;" onclick="location.reload()">خروج</button>
            </div>
        </div>
    </div>

    <div id="review-overlay" class="hidden">
        <div class="result-card">
            <h3 style="margin-top:0">الأجوبة السابقة</h3>
            <div id="review-list" class="review-list"></div>
            <button class="btn" style="background:var(--danger); color:white; width:100%; margin-top:15px;" onclick="document.getElementById('review-overlay').classList.add('hidden')">رجوع</button>
        </div>
    </div>

<script>
    // نفس منطق البرمجة السابق مع تحسينات طفيفة للهاتف
    const QUESTIONS_BANK = ["واش الحاجة لي إذا طاحت في الدار كامل يخافو منها؟ 😅", "واش أول حاجة ديرها كي ينقطع الضوء؟ 💡", "وش هو أغرب عذر سمعتو باش واحد ما يخدمش؟ 🤣", "إذا تصبح رئيس نهار واحد، وش أول قرار غبي تديرو؟ 👑", "وش الحاجة لي تقولها قدام الناس وتندم عليها بعد؟ 😬", "إذا صاحبك يطلب منك 1000 دج وما يرجعهمش، وش تدير؟ 💸", "وش هو أتعس فطور فالعالم؟ 🥲", "إذا يدوك للعرس غصب عليك، وش تدير باش تهرب؟ 😂", "وش الحاجة لي تخليك تضحك بلا سبب؟", "وش أكثر كلمة يقولها الجزائري كي يتعصب؟ 😡", "وش الحاجة لي دايماً تكون “غالية بزاف”؟ 💰", "وش أكثر حاجة تتقال في الأعراس؟ 💃", "وش الحاجة لي نكذبو فيها كامل؟ 🤥", "وش أكثر حاجة تخاف منها كي تكون صغير؟ 👻", "وش الحاجة لي تشريها وما تستعملهاش؟ 🛒", "وش أكثر جملة يقولها الأستاذ؟ 🧑‍🏫", "إذا لازم تعيش مع حيوان، وش تختار؟ 🐒", "وش الجملة لي دايماً تسمعها من الأم؟ 👩", "وش أكثر كلمة تتقال في الكورة؟ ⚽", "وش الحاجة لي دايماً تضيع في الدار؟ 🔑"];

    const firebaseConfig = {
        apiKey: "AIzaSyCTKYD680Jdbl0azC9RTtuKZBaLX2uU_Ck",
        authDomain: "my-online-store-34f34.firebaseapp.com",
        databaseURL: "https://my-online-store-34f34-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "my-online-store-34f34",
        storageBucket: "my-online-store-34f34.firebasestorage.app",
        messagingSenderId: "288655549705",
        appId: "1:288655549705:web:d3a33fa537ee1793be1fd8"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let rId, myRole, oppRole, timerInterval = null, lastSnap = null;
    const alpha = "أبتثجحخدذرزسشصضطظعغفقكلمنهوي";

    function createRoom() {
        const code = Math.floor(1000 + Math.random() * 9000);
        document.getElementById('roomInput').value = code;
        setupRoom('host');
    }

    function setupRoom(role) {
        rId = document.getElementById('roomInput').value;
        if(!rId) return alert("أدخل كود الغرفة");
        myRole = role; oppRole = (role === 'host') ? 'guest' : 'host';
        document.getElementById('roomCodeText').innerText = rId;

        if(role === 'host') {
            db.ref('rooms/'+rId).set({
                hostL: generateLetters(), guestL: [], status: 'waiting', 
                q: QUESTIONS_BANK[Math.floor(Math.random()*QUESTIONS_BANK.length)],
                ans: {host:[], guest:[]}, scores: {host:0, guest:0}, timeLeft: 30
            });
        } else {
            db.ref('rooms/'+rId).update({ guestL: generateLetters(), status: 'playing' });
        }
        document.getElementById('lobby').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        startListening();
    }

    function startListening() {
        db.ref('rooms/'+rId).on('value', snap => {
            const d = snap.val(); if(!d) return;
            lastSnap = d;

            const myS = d.scores[myRole] || 0;
            const oppS = d.scores[oppRole] || 0;
            document.getElementById('my-score').innerText = myS;
            document.getElementById('opp-score').innerText = oppS;

            if (myS >= 15 || oppS >= 15) {
                document.getElementById('result-overlay').classList.remove('hidden');
                document.getElementById('win-ui').classList.toggle('hidden', myS < 15);
                document.getElementById('lose-ui').classList.toggle('hidden', oppS < 15);
                stopLocalTimer(); return; 
            } else {
                document.getElementById('result-overlay').classList.add('hidden');
            }

            document.getElementById('question-area').innerText = d.q;
            renderL('my-letters', d[myRole+'L']); renderL('opp-letters', d[oppRole+'L']);

            document.getElementById('my-ans-list').innerHTML = (d.ans && d.ans[myRole] || []).map(a => `
                <div class="ans-item"><span>${a.text}</span><small>${a.status==='accepted'?'✅':a.status==='rejected'?'❌':'⏳'}</small></div>
            `).join('');

            if(d.status === 'playing') {
                if(d.timeLeft > 0) {
                    document.getElementById('timer-display').innerText = d.timeLeft;
                    document.getElementById('action-area').classList.remove('hidden');
                    document.getElementById('host-controls').classList.add('hidden');
                    if(myRole === 'host') startTimerLogic();
                } else {
                    document.getElementById('action-area').classList.add('hidden');
                    renderVotingList(d.ans ? d.ans[oppRole] : []);
                    if(myRole === 'host') document.getElementById('host-controls').classList.remove('hidden');
                    stopLocalTimer();
                }
            }
        });
    }

    function resetGameFull() {
        if(myRole !== 'host') return alert("المضيف فقط يعيد اللعبة");
        db.ref('rooms/'+rId).update({
            scores: {host:0, guest:0}, ans: {host:[], guest:[]},
            timeLeft: 30, status: 'playing',
            q: QUESTIONS_BANK[Math.floor(Math.random()*QUESTIONS_BANK.length)],
            hostL: generateLetters(), guestL: generateLetters()
        });
    }

    function showReview() {
        const d = lastSnap; if(!d) return;
        let html = "<b>أجوبتي:</b><br>";
        (d.ans[myRole] || []).forEach(a => html += `<div class='ans-item'>${a.text} <span>${a.status==='accepted'?'✅':'❌'}</span></div>`);
        html += "<br><b>أجوبة الخصم:</b><br>";
        (d.ans[oppRole] || []).forEach(a => html += `<div class='ans-item'>${a.text} <span>${a.status==='accepted'?'✅':'❌'}</span></div>`);
        document.getElementById('review-list').innerHTML = html;
        document.getElementById('review-overlay').classList.remove('hidden');
    }

    function startTimerLogic() {
        if(timerInterval) return;
        timerInterval = setInterval(() => { db.ref(`rooms/${rId}/timeLeft`).transaction(t => (t > 0) ? t - 1 : 0); }, 1000);
    }

    function stopLocalTimer() { clearInterval(timerInterval); timerInterval = null; }

    function submitAns() {
        const inp = document.getElementById('ansInput'); if(!inp.value) return;
        db.ref(`rooms/${rId}/ans/${myRole}`).once('value', s => {
            let list = s.val() || [];
            list.push({ text: inp.value, status: 'pending' });
            db.ref(`rooms/${rId}/ans/${myRole}`).set(list);
            inp.value = "";
        });
    }

    function renderVotingList(list) {
        const container = document.getElementById('voting-panel');
        container.innerHTML = "<small>اضغط للتقييم:</small><br>";
        (list || []).forEach((ans, index) => {
            if(ans.status !== 'pending') return;
            container.innerHTML += `<div class="ans-item"><span>${ans.text}</span> 
                <div><button class="btn" style="background:var(--success);padding:2px 8px" onclick="vote('${index}','accepted')">✅</button>
                <button class="btn" style="background:var(--danger);padding:2px 8px" onclick="vote('${index}','rejected')">❌</button></div></div>`;
        });
    }

    function vote(index, status) {
        if(status === 'accepted') db.ref(`rooms/${rId}/scores/${oppRole}`).transaction(s => (s || 0) + 1);
        db.ref(`rooms/${rId}/ans/${oppRole}/${index}/status`).set(status);
    }

    function nextRound() {
        db.ref('rooms/'+rId).update({
            timeLeft: 30, status: 'playing', q: QUESTIONS_BANK[Math.floor(Math.random()*QUESTIONS_BANK.length)],
            ans: { host: [], guest: [] }, hostL: generateLetters(), guestL: generateLetters()
        });
    }

    function generateLetters() { return Array.from({length:7}, () => alpha[Math.floor(Math.random()*alpha.length)]); }
    function renderL(id, list) { document.getElementById(id).innerHTML = (list || []).map(l => `<span class="letter-item">${l}</span>`).join(''); }
    function copyCode() { navigator.clipboard.writeText(rId); alert("تم النسخ!"); }
</script>
</body>
</html>
